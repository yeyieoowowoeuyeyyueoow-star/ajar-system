<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول — نظام أجير</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh; margin: 0;
      display: flex;
      background: #0D1B2A;
    }

    /* ── Left decorative panel ── */
    .login-panel {
      flex: 1; display: none;
      flex-direction: column; justify-content: center; align-items: center;
      padding: 3rem;
      background: linear-gradient(145deg, #0D1B2A 0%, #112236 40%, #1A3050 100%);
      position: relative; overflow: hidden;
    }
    @media (min-width: 900px) { .login-panel { display: flex; } }

    .login-panel::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(59,130,246,.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(99,102,241,.10) 0%, transparent 50%);
    }
    .panel-dots {
      position: absolute; inset: 0; overflow: hidden; opacity: .4;
      background-image: radial-gradient(circle, rgba(255,255,255,.15) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .panel-content { position: relative; z-index: 1; text-align: center; max-width: 360px; }
    .panel-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #3B82F6, #6366f1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: #fff;
      box-shadow: 0 8px 32px rgba(59,130,246,.45);
      margin: 0 auto 1.5rem;
    }
    .panel-title { color: #fff; font-size: 1.7rem; font-weight: 800; margin-bottom: .5rem; }
    .panel-sub { color: rgba(200,216,240,.55); font-size: .9rem; line-height: 1.7; }
    .panel-stats { display: flex; gap: 2rem; margin-top: 2.5rem; justify-content: center; }
    .panel-stat-num { color: #fff; font-size: 1.5rem; font-weight: 800; }
    .panel-stat-lbl { color: rgba(200,216,240,.5); font-size: .73rem; }

    /* ── Right form panel ── */
    .login-form-wrap {
      width: 100%; max-width: 460px;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      background: #F0F4FA;
    }
    @media (min-width: 900px) { .login-form-wrap { max-width: 420px; } }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2.2rem;
      width: 100%;
      box-shadow: 0 8px 40px rgba(15,28,46,.12);
    }
    .login-logo-sm {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3B82F6, #6366f1);
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: #fff;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      margin: 0 auto 1.25rem;
    }
    @media (min-width: 900px) { .login-logo-sm { display: none; } }

    .login-heading { font-size: 1.35rem; font-weight: 800; color: #0F1C2E; text-align: center; }
    .login-sub { font-size: .83rem; color: #8A97A8; text-align: center; margin-bottom: 1.75rem; }

    .field-label {
      font-size: .8rem; font-weight: 700; color: #4B5B72;
      display: block; margin-bottom: .4rem;
    }
    .input-wrap { position: relative; margin-bottom: 1.1rem; }
    .input-wrap i {
      position: absolute; right: .9rem; top: 50%;
      transform: translateY(-50%);
      color: #8A97A8; font-size: .95rem; pointer-events: none;
    }
    .login-input {
      width: 100%;
      padding: .65rem 2.4rem .65rem .9rem;
      border: 1.5px solid #E4EAF3;
      border-radius: 11px;
      font-family: 'Cairo', sans-serif;
      font-size: .9rem; color: #0F1C2E;
      background: #FAFBFD;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .login-input:focus {
      border-color: #3B82F6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .login-input::placeholder { color: #B0BBC9; }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      color: #fff; border: none;
      border-radius: 11px;
      font-family: 'Cairo', sans-serif;
      font-size: .95rem; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      transition: all .2s;
      margin-top: .5rem;
    }
    .btn-login:hover { background: linear-gradient(135deg, #2563EB, #1D4ED8); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(59,130,246,.45); }
    .btn-login:active { transform: none; }
  </style>
</head>
<body>
  <!-- Decorative panel -->
  <div class="login-panel">
    <div class="panel-dots"></div>
    <div class="panel-content">
      <div class="panel-logo">أ</div>
      <div class="panel-title">نظام أجير</div>
      <div class="panel-sub">منصة متكاملة لإدارة تصاريح العمل<br/>وتتبع العمال والشركات</div>
      <div class="panel-stats">
        <div>
          <div class="panel-stat-num">٣٦٠°</div>
          <div class="panel-stat-lbl">إدارة شاملة</div>
        </div>
        <div>
          <div class="panel-stat-num">PDF</div>
          <div class="panel-stat-lbl">تصاريح رسمية</div>
        </div>
        <div>
          <div class="panel-stat-num">QR</div>
          <div class="panel-stat-lbl">تحقق فوري</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Form panel -->
  <div class="login-form-wrap">
    <div class="login-box">
      <div class="login-logo-sm">أ</div>
      <h1 class="login-heading">مرحباً بك</h1>
      <p class="login-sub">سجّل دخولك للمتابعة إلى نظام أجير</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div style="background:{{ '#FEE2E2' if cat=='danger' else '#DCFCE7' }};color:{{ '#991B1B' if cat=='danger' else '#166534' }};border-radius:10px;padding:.7rem 1rem;font-size:.84rem;margin-bottom:1rem;">
            <i class="bi bi-{{ 'exclamation-triangle-fill' if cat=='danger' else 'check-circle-fill' }} me-1"></i>{{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('web.login_post') }}">
        <label class="field-label">اسم المستخدم</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="login-input"
                 placeholder="أدخل اسم المستخدم" required autofocus/>
        </div>

        <label class="field-label">كلمة المرور</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="login-input"
                 placeholder="أدخل كلمة المرور" required/>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
