<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول — نظام أجير</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    * { font-family: 'Cairo', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2444 0%, #1e4080 50%, #0f2444 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-logo {
      width: 64px; height: 64px; background: #3b82f6;
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 1.8rem; font-weight: 700;
      margin: 0 auto 1rem;
    }
    .form-control { border-radius: 10px; padding: .65rem 1rem; border: 1.5px solid #e2e8f0; }
    .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .btn-login {
      background: #3b82f6; color: #fff; border: none; border-radius: 10px;
      padding: .75rem; font-size: 1rem; font-weight: 600; width: 100%;
      transition: background .2s;
    }
    .btn-login:hover { background: #2563eb; }
    .input-group-text { border-radius: 10px 0 0 10px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-left: none; }
    .hint-box { background: #eff6ff; border-radius: 10px; padding: .75rem 1rem; font-size: .82rem; color: #1e40af; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">أ</div>
    <h4 class="text-center fw-700 mb-1">نظام أجير</h4>
    <p class="text-center text-muted mb-4" style="font-size:.88rem;">منصة إدارة تصاريح العمل</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.88rem;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('web.login_post') }}">
      <div class="mb-3">
        <label class="form-label fw-600 mb-1" style="font-size:.88rem;">اسم المستخدم</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600 mb-1" style="font-size:.88rem;">كلمة المرور</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required/>
        </div>
      </div>
      <button type="submit" class="btn-login mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول
      </button>
    </form>

    <div class="hint-box">
      <strong>بيانات الدخول التجريبية:</strong><br/>
      المدير: <code>admin / admin123</code><br/>
      المشرف: <code>manager1 / manager123</code><br/>
      المشغل: <code>operator1 / operator123</code>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
