{% extends 'base.html' %}
{% block title %}{{ 'تعديل مستخدم' if usr else 'إضافة مستخدم' }}{% endblock %}
{% block page_title %}{{ 'تعديل بيانات المستخدم' if usr else 'إضافة مستخدم جديد' }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header px-4 py-3">
    <i class="bi bi-person-plus text-primary me-2"></i>
    {{ 'تعديل المستخدم' if usr else 'مستخدم جديد' }}
  </div>
  <div class="card-body px-4 py-4">
    <form method="POST" action="{{ url_for('web.users_update', uid=usr.id) if usr else url_for('web.users_create') }}">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label fw-600">الاسم الكامل <span class="text-danger">*</span></label>
          <input type="text" name="fullName" class="form-control" required
                 value="{{ usr.fullName if usr else '' }}"/>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-600">اسم المستخدم <span class="text-danger">*</span></label>
          <input type="text" name="username" class="form-control" required
                 value="{{ usr.username if usr else '' }}" {{ 'readonly' if usr }}/>
        </div>
        <div class="col-12">
          <label class="form-label fw-600">البريد الإلكتروني</label>
          <input type="email" name="email" class="form-control"
                 value="{{ usr.email if usr else '' }}"/>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-600">الدور</label>
          <select name="role" class="form-select">
            {% for val, label in role_ar.items() %}
            <option value="{{ val }}" {{ 'selected' if usr and usr.role == val }}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-600">الحالة</label>
          <select name="status" class="form-select">
            <option value="active"    {{ 'selected' if usr and usr.status == 'active' }}>نشط</option>
            <option value="suspended" {{ 'selected' if usr and usr.status == 'suspended' }}>موقوف</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-600">{{ 'كلمة المرور الجديدة (اتركها فارغة للإبقاء على القديمة)' if usr else 'كلمة المرور' }}</label>
          <input type="password" name="password" class="form-control"
                 placeholder="{{ '' if usr else 'أدخل كلمة المرور' }}" {{ 'required' if not usr }}/>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ 'حفظ التعديلات' if usr else 'إضافة المستخدم' }}
        </button>
        <a href="{{ url_for('web.users_list') }}" class="btn btn-outline-secondary">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
